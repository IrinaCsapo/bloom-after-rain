[build]
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/questions"
  to = "/questions.html"
  status = 200

[[redirects]]
  from = "/bloom"
  to = "/bloom.html"
  status = 200

[[redirects]]
  from = "/garden"
  to = "/garden.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200
